<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Baby</title>

<style>
body{
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align:center;
    font-family: Arial;
    padding:50px;
}

h1{
    font-size:60px;
    color:white;
}

p{
    font-size:24px;
}

.gallery{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.gallery img{
    width:200px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button{
    margin-top:30px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:yellow;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>🎉 Happy Birthday Baby 💖</h1>
<img src="cake.jpg" width="250">

<p>You make my life brighter every day.  
Wishing you love, happiness, and lots of cake today! 🎂</p>

<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
</div>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<p id="message"></p>

<script>
function showMessage(){
document.getElementById("message").innerHTML =
"💖 I love you so much! Happy Birthday Baby! 🎈";
}
</script>

</body>

</html>
